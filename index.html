<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Рефлексия урока</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --panel-bg: #ffffff;
            --accent-color: #4a90e2;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
        }

        .container {
            display: flex;
            height: 100vh;
        }

        /* Левая часть: Сетка кнопок */
        .grid-container {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            grid-template-rows: repeat(5, 1fr);
            gap: 10px;
            padding: 20px;
            border-right: 2px solid #ddd;
        }

        .grid-item {
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.2rem;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
        }

        .grid-item:hover {
            background-color: #357abd;
            transform: scale(1.02);
        }

        .grid-item:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        /* Правая часть: Стена ответов */
        .wall-container {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-wrap: wrap;
            align-content: flex-start;
            gap: 15px;
            background-image: radial-gradient(#d1d1d1 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .sticker {
            width: calc(50% - 10px);
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .sticker h4 { margin: 0 0 10px 0; font-size: 0.9rem; text-decoration: underline; }
        .sticker p { margin: 0; font-weight: bold; }

        /* Модальное окно */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 400px;
            max-width: 90%;
            text-align: center;
        }

        textarea {
            width: 100%;
            height: 80px;
            margin: 15px 0;
            padding: 10px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 5px;
            resize: none;
        }

        .color-picker {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .color-opt {
            width: 30px; height: 30px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
        }

        .color-opt.active { border-color: #000; }

        .btn-send {
            background: #27ae60;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="grid-container" id="buttonGrid"></div>
    
    <div class="wall-container" id="answerWall"></div>
</div>

<div class="modal" id="modal">
    <div class="modal-content">
        <h3 id="questionText">Вопрос...</h3>
        <textarea id="answerInput" placeholder="Твой ответ здесь..."></textarea>
        
        <p>Выбери цвет настроения:</p>
        <div class="color-picker" id="colorPicker">
            <div class="color-opt" style="background: #ffadad;" data-color="#ffadad"></div>
            <div class="color-opt" style="background: #ffd6a5;" data-color="#ffd6a5"></div>
            <div class="color-opt" style="background: #caffbf;" data-color="#caffbf"></div>
            <div class="color-opt" style="background: #9bf6ff;" data-color="#9bf6ff"></div>
            <div class="color-opt" style="background: #bdb2ff;" data-color="#bdb2ff"></div>
        </div>
        
        <button class="btn-send" onclick="sendAnswer()">Отправить свой ответ</button>
    </div>
</div>

<script>
    const questions = [
        "Что было самым сложным сегодня?", "Какое открытие ты сделал?",
        "Оцени свою работу от 1 до 10", "Что нужно повторить дома?",
        "Кому бы ты сказал 'спасибо' за урок?", "Опиши урок одним словом",
        "Какую цель поставишь на следующий урок?", "Что тебя удивило?",
        "Где пригодятся эти знания?", "Самый интересный момент?",
        "Что осталось непонятным?", "Ты доволен своим результатом?",
        "Какой факт запомнился больше всего?", "Как ты себя чувствуешь?",
        "Какое задание было скучным?", "Ты работал в полную силу?",
        "Что бы ты изменил в уроке?", "Главная мысль урока — это...",
        "Какую оценку ты себе поставишь?", "Было ли тебе комфортно?",
        "Твой личный успех сегодня?", "Урок пролетел быстро или тянулся?",
        "На какой вопрос ты не получил ответа?", "В чем ты стал лучше сегодня?",
        "Готов к контрольной по этой теме?"
    ];

    const grid = document.getElementById('buttonGrid');
    const modal = document.getElementById('modal');
    const questionHeader = document.getElementById('questionText');
    const answerInput = document.getElementById('answerInput');
    const wall = document.getElementById('answerWall');
    
    let currentQuestion = "";
    let selectedColor = "#ffadad";
    let lastClickedButton = null;

    // Создание сетки 5x5
    for (let i = 0; i < 25; i++) {
        const btn = document.createElement('button');
        btn.className = 'grid-item';
        btn.innerText = i + 1;
        btn.onclick = () => openModal(i, btn);
        grid.appendChild(btn);
    }

    // Выбор цвета
    document.querySelectorAll('.color-opt').forEach(opt => {
        opt.onclick = () => {
            document.querySelectorAll('.color-opt').forEach(b => b.classList.remove('active'));
            opt.classList.add('active');
            selectedColor = opt.dataset.color;
        };
    });

    function openModal(index, btn) {
        currentQuestion = questions[index];
        questionHeader.innerText = currentQuestion;
        answerInput.value = "";
        lastClickedButton = btn;
        modal.style.display = 'flex';
    }

    function sendAnswer() {
        const text = answerInput.value.trim();
        if (!text) return alert("Пожалуйста, напиши ответ!");

        // Создаем стикер на стене
        const sticker = document.createElement('div');
        sticker.className = 'sticker';
        sticker.style.backgroundColor = selectedColor;
        sticker.innerHTML = `<h4>${currentQuestion}</h4><p>${text}</p>`;
        
        wall.prepend(sticker); // Новые ответы сверху

        // Закрываем модалку и отключаем кнопку
        modal.style.display = 'none';
        lastClickedButton.disabled = true;
        lastClickedButton.style.opacity = "0.5";
    }

    // Закрытие при клике вне окна
    window.onclick = (event) => {
        if (event.target == modal) modal.style.display = 'none';
    }
</script>

</body>
</html>
