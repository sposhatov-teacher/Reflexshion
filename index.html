<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Интерактивная Рефлексия</title>
    <style>
        :root {
            --bg-color: #f0f4f8;
            --neon-green: #39ff14;
            --neon-red: #ff3131;
            --neon-yellow: #faff00;
            --neon-blue: #00d4ff;
            --glass: rgba(255, 255, 255, 0.8);
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-color);
            background-image: radial-gradient(#d1d9e6 1px, transparent 1px);
            background-size: 30px 30px;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Левая сторона: Сетка */
        .grid-container {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            grid-template-rows: repeat(5, 1fr);
            gap: 15px;
            padding: 30px;
            border-right: 2px dashed #adc5d9;
        }

        .ref-button {
            background: #fff;
            border: 2px solid var(--neon-blue);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.2);
        }

        .ref-button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px var(--neon-blue);
        }

        .ref-button:disabled {
            background: #e0e0e0;
            border-color: #bbb;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        /* Правая сторона: Стена */
        .wall-container {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
            display: flex;
            flex-wrap: wrap;
            align-content: flex-start;
            gap: 15px;
            background: rgba(255, 255, 255, 0.5);
        }

        .post-it {
            width: 180px;
            padding: 15px;
            border-radius: 8px;
            font-size: 0.9rem;
            color: #333;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .post-it strong { display: block; margin-bottom: 5px; color: #000; }

        /* Модальное окно */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
            z-index: 100;
        }

        .modal {
            background: white;
            padding: 30px;
            border-radius: 20px;
            width: 400px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        textarea {
            width: 100%;
            height: 80px;
            margin: 15px 0;
            border-radius: 10px;
            border: 1px solid #ccc;
            padding: 10px;
            box-sizing: border-box;
            font-family: monospace;
        }

        .mood-selector {
            display: flex;
            justify-content: space-around;
            margin: 15px 0;
        }

        .mood-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            transition: 0.2s;
        }

        .mood-btn:hover { transform: scale(1.2); }
        .green { background: var(--neon-green); box-shadow: 0 0 10px var(--neon-green); }
        .yellow { background: var(--neon-yellow); box-shadow: 0 0 10px var(--neon-yellow); }
        .red { background: var(--neon-red); box-shadow: 0 0 10px var(--neon-red); }

        .submit-btn {
            background: var(--neon-blue);
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
        }

        @keyframes popIn {
            from { transform: scale(0); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="grid-container" id="grid"></div>
    <div class="wall-container" id="wall"></div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <h3 id="questionTitle">Вопрос</h3>
            <textarea id="userInput" placeholder="Напиши здесь свой ответ ..."></textarea>
            <p>Выбери настроение в конце урока:</p>
            <div class="mood-selector">
                <button class="mood-btn green" onclick="selectMood('#39ff14')"></button>
                <button class="mood-btn yellow" onclick="selectMood('#faff00')"></button>
                <button class="mood-btn red" onclick="selectMood('#ff3131')"></button>
            </div>
            <button class="submit-btn" onclick="submitResponse()">Отправить свой ответ</button>
        </div>
    </div>

    <script>
        const questions = [
            "Что сегодня было самым сложным в алгоритме?",
            "Какой индекс (первый или второй) обычно отвечает за номер строки в коде?",
            "Опиши тему урока одним словом.",
            "Где в жизни пригодится текущая тема?",
            "Твое главное открытие за 40 минут?",
            "Что было самым сложным в понимании вложенных циклов?",
            "Что сегодня на уроке было для тебя «легкой прогулкой»?",
            "Оцени чистоту своего сегодняшнего 'кода' знаний по 100 бальной шкале.",
            "Что бы ты погуглил после этого урока?",
            "Какое задание заставило тебя по-настоящему понервничать?",
            "Если бы ты был элементом массива, то под каким индексом ты бы сегодня находился и почему?",
            "Какую оценку за сегодняшнюю практику ты бы поставил сам себе и за что?",
            "Кому из одноклассников ты бы сказал спасибо за урок?",
            "Было ли тебе комфортно работать в том темпе, который задал учитель?",
            "Что в сегодняшней теме вызвало у тебя наибольший интерес?",
            "Над чем ты еще поработаешь дома по теме урока?",
            "Какой момент урока запомнился лучше всего и почему?",
            "Что ты сможешь сам объяснить другому из сегодняшнего этого урока?"

        ];

        let currentButton = null;
        let selectedColor = '#39ff14';

        // Создание сетки 5x5
        const grid = document.getElementById('grid');
        for (let i = 0; i < 25; i++) {
            const btn = document.createElement('button');
            btn.className = 'ref-button';
            btn.onclick = () => openModal(btn);
            grid.appendChild(btn);
        }

        function openModal(btn) {
            currentButton = btn;
            const randomQ = questions[Math.floor(Math.random() * questions.length)];
            document.getElementById('questionTitle').innerText = randomQ;
            document.getElementById('modalOverlay').style.display = 'flex';
            document.getElementById('userInput').value = '';
        }

        function selectMood(color) {
            selectedColor = color;
            // Визуальный фидбек выбора
            document.querySelectorAll('.mood-btn').forEach(b => b.style.outline = 'none');
            event.target.style.outline = '3px solid #00d4ff';
        }

        function submitResponse() {
            const text = document.getElementById('userInput').value;
            const question = document.getElementById('questionTitle').innerText;

            if (!text.trim()) {
                alert("Пожалуйста, напиши хотя бы пару символов!");
                return;
            }

            // Добавление на стену
            const wall = document.getElementById('wall');
            const postIt = document.createElement('div');
            postIt.className = 'post-it';
            postIt.style.backgroundColor = selectedColor;
            postIt.style.boxShadow = `0 5px 15px ${selectedColor}66, 0 0 10px ${selectedColor}`;
            
            postIt.innerHTML = `
                <strong>${question}</strong>
                <p>> ${text}</p>
            `;
            
            wall.prepend(postIt); // Новые ответы сверху

            // Деактивация кнопки и закрытие
            currentButton.disabled = true;
            document.getElementById('modalOverlay').style.display = 'none';
        }
    </script>
</body>
</html>
